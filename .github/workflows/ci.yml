name: TransientDB CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering
    inputs:
      run_stress_tests:
        description: 'Run stress tests'
        required: true
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      # Check everything builds
      - name: Check main build
        run: cargo check --all-features

      # Check formatting
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Run clippy
      - name: Check lints
        run: cargo clippy --all-features -- -D warnings

      # Run unit tests
      - name: Run unit tests
        run: cargo test --all-features --lib

      # Check docs build
      - name: Check docs
        run: cargo doc --no-deps

  doc-tests:
    name: Doc Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run doc tests
        run: cargo test --doc

  msrv:
    name: MSRV Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.80.0
      - uses: Swatinem/rust-cache@v2
      - name: Check builds with minimum supported Rust version
        run: cargo check --all-features

  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        shell: bash
        run: |
          # Run all tests in the tests directory with increased thread stack size
          RUST_MIN_STACK=8388608 cargo test --test '*'

  apple-simulators:
    name: ${{ matrix.platform }} Simulator Tests
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios-sim
            sdk: iphonesimulator
            platform: iOS
            runtime: com.apple.CoreSimulator.SimRuntime.iOS-17-4
            device: iPhone 14
          - target: aarch64-apple-tvos-sim
            sdk: appletvsimulator
            platform: tvOS
            runtime: com.apple.CoreSimulator.SimRuntime.tvOS-17-4
            device: Apple TV
          - target: aarch64-apple-xros-sim
            sdk: xrsimulator
            platform: visionOS
            runtime: com.apple.CoreSimulator.SimRuntime.xrOS-1-1
            device: Apple Vision Pro
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo +nightly build --target ${{ matrix.target }} --all-features

      - name: Run tests
        run: |
          # Debug: Show directory structure
          echo "=== Directory structure ==="
          ls -R target/${{ matrix.target }}/debug/deps/
          
          # Create and boot simulator
          echo "=== Creating simulator ==="
          DEVICE_ID=$(xcrun simctl create test-device "${{ matrix.device }}" "${{ matrix.runtime }}")
          echo "Device ID: ${DEVICE_ID}"
          
          echo "=== Booting simulator ==="
          xcrun simctl boot "${DEVICE_ID}"
          
          # Get the test binary path
          echo "=== Locating test binary ==="
          TEST_BINARY=$(find target/${{ matrix.target }}/debug/deps -name "transientdb-*" -type f ! -name "*.d")
          echo "Test binary path: ${TEST_BINARY}"
          
          # Make binary executable
          echo "=== Making binary executable ==="
          chmod +x "${TEST_BINARY}"
          
          # Verify binary exists and is executable
          ls -l "${TEST_BINARY}"
          
          # Run tests in simulator with more logging
          echo "=== Running tests ==="
          RUST_MIN_STACK=8388608 RUST_BACKTRACE=1 xcrun simctl spawn "${DEVICE_ID}" "${TEST_BINARY}"
          
          # Cleanup
          echo "=== Cleanup ==="
          xcrun simctl shutdown "${DEVICE_ID}"
          xcrun simctl delete "${DEVICE_ID}"