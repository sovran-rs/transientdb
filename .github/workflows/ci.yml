name: TransientDB CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering
    inputs:
      run_stress_tests:
        description: 'Run stress tests'
        required: true
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      # Check everything builds
      - name: Check main build
        run: cargo check --all-features

      # Check formatting
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Run clippy
      - name: Check lints
        run: cargo clippy --all-features -- -D warnings

      # Run unit tests
      - name: Run unit tests
        run: cargo test --all-features --lib

      # Check docs build
      - name: Check docs
        run: cargo doc --no-deps

  doc-tests:
    name: Doc Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run doc tests
        run: cargo test --doc

  msrv:
    name: MSRV Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.80.0
      - uses: Swatinem/rust-cache@v2
      - name: Check builds with minimum supported Rust version
        run: cargo check --all-features

  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        shell: bash
        run: |
          # Run all tests in the tests directory with increased thread stack size
          RUST_MIN_STACK=8388608 cargo test --test '*'

  apple-simulators:
    name: ${{ matrix.platform }} Simulator Tests
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios-sim
            sdk: iphonesimulator
            platform: iOS
          - target: aarch64-apple-tvos-sim
            sdk: appletvsimulator
            platform: tvOS
          - target: aarch64-apple-xros-sim
            sdk: xrsimulator
            platform: visionOS
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo +nightly build --target ${{ matrix.target }} --all-features

      - name: Run tests
        run: |
          # Get SDK path
          SDK_PATH=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          
          # Set simulator environment
          export DYLD_ROOT_PATH="${SDK_PATH}"
          export DYLD_LIBRARY_PATH="${SDK_PATH}/usr/lib/system:${SDK_PATH}/usr/lib"
          export DYLD_FRAMEWORK_PATH="${SDK_PATH}/System/Library/Frameworks:${SDK_PATH}/System/Library/PrivateFrameworks"
          
          # Run tests with increased stack size
          RUST_MIN_STACK=8388608 cargo +nightly test --target ${{ matrix.target }} --all-features